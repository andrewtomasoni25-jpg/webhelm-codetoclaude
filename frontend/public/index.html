    <!-- Preload the hero logo — it's our LCP element, so the browser should
         start fetching it during the HTML parse instead of waiting for React
         to mount. Self-hosted on the same origin, so no preconnect needed. -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="%PUBLIC_URL%/hero-logo.webp"
      fetchpriority="high"
    />

    <!-- Self-hosted fonts — Outfit + Manrope WOFF2 subsets live in
         /public/fonts/ so they come down from the same origin as the
         rest of the site. No third-party handshake, no dependency on
         Google's CDN.

         @font-face rules are inlined below rather than in src/index.css
         because webpack's CSS loader would try to resolve `/fonts/...`
         as a module import and fail the build. Inlining here is also
         faster: the browser sees the declarations during HTML parse,
         before the main stylesheet has even downloaded.

         Preloading the two `-latin.woff2` files — they cover
         U+0000–00FF which is the entire English character set, so
         the hero logo and headline render with the correct typeface
         from first paint. latin-ext still loads on demand if a
         character falls into its unicode-range. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="%PUBLIC_URL%/fonts/outfit-latin.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="%PUBLIC_URL%/fonts/manrope-latin.woff2"
      crossorigin
    />
